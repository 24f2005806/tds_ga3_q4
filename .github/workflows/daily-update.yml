name: Daily Repository Update

permissions:
  contents: write

on:
  schedule:
    - cron: '25 18 * * *'   # Runs daily at 18:25 UTC (specific time, no wildcards)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Git
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

      - name: Update file - 24f2005806@ds.study.iitm.ac.in
        run: |
          echo "Automated update on $(date)" >> daily-log.txt

      - name: Commit changes
        run: |
          git add daily-log.txt
          git commit -m "Daily automated commit $(date)" || echo "No changes to commit"

      - name: Push changes
        run: |
          git push
